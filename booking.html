<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic Metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book your Pulse VR experience today.">
    <meta name="author" content="Pulse VR">

    <title>Pulse VR | Booking</title>

    <link rel="stylesheet" href="booking.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        body {
    margin: 0;
    min-height: 100vh;
    color: white;

    background:
        radial-gradient(100% 100% at var(--157-x-position) var(--157-y-position), #9c489c 0%, transparent),
        radial-gradient(100% 100% at var(--158-x-position) var(--158-y-position), #341834 -43%, transparent),
        radial-gradient(100% 100% at var(--159-x-position) var(--159-y-position), #000111 -38%, transparent),
        radial-gradient(100% 100% at var(--160-x-position) var(--160-y-position), #3a123b -44%, transparent),
        radial-gradient(100% 100% at var(--161-x-position) var(--161-y-position), #1d1827 -67%, transparent),
        #1b253b;

    animation: main 6s ease-in-out infinite;
}

@property --157-x-position {
    syntax: "<percentage>";
    inherits: false;
    initial-value: 6%;
}

@property --157-y-position {
    syntax: "<percentage>";
    inherits: false;
    initial-value: 84%;
}

@property --158-x-position {
    syntax: "<percentage>";
    inherits: false;
    initial-value: 89%;
}

@property --158-y-position {
    syntax: "<percentage>";
    inherits: false;
    initial-value: 87%;
}

@property --159-x-position {
    syntax: "<percentage>";
    inherits: false;
    initial-value: 89%;
}

@property --159-y-position {
    syntax: "<percentage>";
    inherits: false;
    initial-value: 11%;
}

@property --160-x-position {
    syntax: "<percentage>";
    inherits: false;
    initial-value: 39%;
}

@property --160-y-position {
    syntax: "<percentage>";
    inherits: false;
    initial-value: 71%;
}

@property --161-x-position {
    syntax: "<percentage>";
    inherits: false;
    initial-value: 52%;
}

@property --161-y-position {
    syntax: "<percentage>";
    inherits: false;
    initial-value: 53%;
}

@keyframes main {
    0% {
        --157-x-position: 6%;
        --157-y-position: 84%;
        --158-x-position: 89%;
        --158-y-position: 87%;
        --159-x-position: 89%;
        --159-y-position: 11%;
        --160-x-position: 39%;
        --160-y-position: 71%;
        --161-x-position: 52%;
        --161-y-position: 53%;
    }

    50% {
        --157-x-position: 80%;
        --157-y-position: 15%;
        --158-x-position: 20%;
        --158-y-position: 20%;
        --159-x-position: 20%;
        --159-y-position: 20%;
        --160-x-position: 20%;
        --160-y-position: 20%;
        --161-x-position: 20%;
        --161-y-position: 20%;
    }

    100% {
        --157-x-position: 6%;
        --157-y-position: 84%;
        --158-x-position: 89%;
        --158-y-position: 87%;
        --159-x-position: 89%;
        --159-y-position: 11%;
        --160-x-position: 39%;
        --160-y-position: 71%;
        --161-x-position: 52%;
        --161-y-position: 53%;
    }
}

@keyframes gradient-animation {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}
        main{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:80vh;
        }

        section{
            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(40px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* KEEPING BUTTON CSS THE SAME */

        .testbtn {
          display: inline-block;
          padding: 15px 35px;
          font-size: 18px;
          font-weight: bold;
          color: white;
          text-decoration: none;

          background: linear-gradient(135deg, #9251FF, #BB00FF);
          border-radius: 10px;

          box-shadow: 0 10px 25px rgba(146, 81, 255, 0.4);
          transition: all 0.3s ease;

          position: relative;
          overflow: hidden;
          cursor:pointer;
          border:none;
        }

        .testbtn::before {
          content: "";
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,0.4),
            transparent
          );
          transition: 0.5s;
        }

        .testbtn:hover::before {
          left: 100%;
        }

        .testbtn:hover {
          transform: translateY(-5px) scale(1.05);
          box-shadow: 0 15px 40px rgba(187, 0, 255, 0.6);
        }

        .booking-card{
            width:420px;
            padding:30px;
            border-radius:15px;
            background:#111;
            color:white;
            box-shadow:0 0 30px rgba(146,81,255,.25);
            animation: fadeUp 0.8s ease;
            transition: 0.35s ease;
        }

        .booking-card:hover{
            transform: translateY(-10px) scale(1.04);
            box-shadow: 0 0 30px rgba(187, 0, 255, 0.6);
        }

                @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2{
            text-align:center;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            margin-bottom:25px;
        }

        .input-group{
            position:relative;
            margin:22px 0;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border:2px solid #9251FF;
            border-radius:8px;
            background:transparent;
            color:white;
            outline:none;
            font-size:16px;
        }

        .input-group label{
            position:absolute;
            left:14px;
            top:14px;
            transition:.3s;
            pointer-events:none;
            color:#bbb;
        }

        .input-group input:focus,
        .input-group input:valid{
            border-color:#BB00FF;
            box-shadow:0 0 15px #BB00FF;
        }

        .input-group input:focus + label,
        .input-group input:valid + label{
            top:-9px;
            left:10px;
            background:#111;
            padding:0 5px;
            font-size:12px;
            color:#BB00FF;
        }

        .select-group{
            margin-bottom:20px;
        }

        .select-group select{
            width:100%;
            padding:14px;
            border-radius:8px;
            border:2px solid #9251FF;
            background:#111;
            color:white;
            font-size:16px;
        }

        .select-group select:focus{
            border-color:#BB00FF;
            box-shadow:0 0 15px #BB00FF;
            outline:none;
        }

        .summary{
            margin:25px 0;
            padding:15px;
            border-radius:8px;
            background:#1d1d1d;
        }

        footer{
            text-align:center;
            padding:20px;
        }
    </style>
</head>

<body>

<header>

    <img src="assets/Logo2.png" width="420" height="125" alt="Pulse VR Logo">

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="booking.html">Booking</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

</header>

<main>

<div class="booking-card">

    <h2>Book Your VR Session</h2>

    <p>Complete your details below to reserve your experience.</p>

    <form id="bookingForm">

        <div class="select-group">
            <select id="game">
                <option>Horror</option>
                <option>Action</option>
                <option>Role Play</option>
                <option>Simulation</option>
            </select>
        </div>

        <div class="input-group">
            <input type="text" id="name" required>
            <label>Full Name</label>
        </div>

        <div class="input-group">
            <input type="email" required>
            <label>Email Address</label>
        </div>

        <div class="input-group">
            <input type="text" maxlength="19" required>
            <label>Card Number</label>
        </div>

        <div class="input-group">
            <input type="text" placeholder="MM/YY" required>
            <label>Expiry Date</label>
        </div>

        <div class="input-group">
            <input type="text" maxlength="8" required>
            <label>Sort Code</label>
        </div>

        <div class="input-group">
            <input type="text" maxlength="3" required>
            <label>CVC</label>
        </div>

        <div class="summary">
            <strong>Booking Preview</strong>
            <p id="previewName">Guest</p>
            <p id="previewGame">Game: Horror</p>
        </div>

        <button type="submit" class="testbtn">
            Submit Booking
        </button>

    </form>

</div>

</main>

<footer>
    <p>&copy; 2026 Pulse VR. All rights reserved.</p>
</footer>

<script>
const nameInput = document.getElementById("name");
const gameSelect = document.getElementById("game");

const previewName = document.getElementById("previewName");
const previewGame = document.getElementById("previewGame");

nameInput.addEventListener("input", () => {
    previewName.textContent =
        nameInput.value.trim() || "Guest";
});

gameSelect.addEventListener("change", () => {
    previewGame.textContent =
        "Game: " + gameSelect.value;
});

document
    .getElementById("bookingForm")
    .addEventListener("submit", function(e){

        e.preventDefault();

        alert(
            "Thank you " +
            (nameInput.value || "Guest") +
            "! Your booking has been submitted."
        );

        window.location.href = "response.html";
    });
</script>

</body>
</html>
